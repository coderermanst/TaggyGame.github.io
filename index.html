<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PeerJS Platformer Tag – 6 Players, Powerups</title>
  <style>
    body { font-family: sans-serif; display: flex; gap: 20px; }

    #left { width: 260px; }

    #lobby, #chat {
      border: 1px solid #aaa;
      padding: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    #playersList {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 4px;
      margin-top: 4px;
    }

    #chatLog {
      width: 100%;
      height: 150px;
      border: 1px solid #ccc;
      overflow-y: auto;
      font-size: 13px;
      padding: 4px;
      background: #fafafa;
    }

    #chatInput {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
    }

    .sysMsg { color: #666; font-style: italic; }
    .meMsg { color: #2e7d32; }
    .otherMsg { color: #1565c0; }

    #game {
      position: relative;
      width: 1200px;
      height: 600px;
      border: 3px solid #222;
      background: linear-gradient(#87ceeb, #87ceeb 65%, #6d4c41 65%, #6d4c41);
      overflow: hidden;
    }

    .player {
      position: absolute;
      width: 40px;
      height: 60px;
      border-radius: 6px;
      background-size: cover;
      background-repeat: no-repeat;
      box-sizing: border-box;
      animation: idleBob 0.8s infinite alternate;
      transition: transform 0.05s linear;
    }

    @keyframes idleBob {
      from { transform: translateY(0); }
      to   { transform: translateY(-3px); }
    }

    .it {
      border: 3px solid #ffeb3b;
      box-shadow: 0 0 15px 4px rgba(255, 235, 59, 0.9);
    }

    .boosted {
      box-shadow: 0 0 18px 5px rgba(0, 255, 255, 0.9);
    }

    .powerup {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      animation: pulse 0.8s infinite alternate;
    }

    .powerup.speed {
      background: radial-gradient(circle, #00e5ff 0%, #01579b 70%);
    }

    .powerup.jump {
      background: radial-gradient(circle, #ffeb3b 0%, #f57f17 70%);
    }

    @keyframes pulse {
      from { transform: scale(0.9); opacity: 0.7; }
      to   { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>

<div id="left">
  <h2>Platformer Tag</h2>

  <input id="nameInput" placeholder="Your name" />

  <br><br>

  <button id="hostBtn">Host Game</button>
  <input id="joinId" placeholder="Host Peer ID" />
  <button id="joinBtn">Join Game</button>

  <div id="myId"></div>
  <div id="status">Not connected</div>

  <div id="lobby">
    <strong>Lobby</strong>
    <div>State: <span id="gameState">LOBBY</span></div>
    <button id="readyBtn" disabled>Ready</button>
    <button id="startBtn" disabled>Start (host)</button>

    <div>Players:</div>
    <div id="playersList"></div>
  </div>

  <div id="chat">
    <strong>Chat</strong>
    <div id="chatLog"></div>
    <input id="chatInput" placeholder="Type message and press Enter" disabled />
  </div>
</div>

<div id="game"></div>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script>
let peer = null;
let isHost = false;
let myId = null;
let myConn = null;
let connections = {}; // host: peerId -> conn

// peerId -> {name, ready, x, y, vy, isIt, speedBoostUntil, jumpBoostUntil}
let players = {};
let gameState = "LOBBY";

// powerupId -> {x, y, type}
let powerups = {};

const statusEl = document.getElementById("status");
const myIdEl = document.getElementById("myId");
const gameStateEl = document.getElementById("gameState");
const playersListEl = document.getElementById("playersList");
const chatLogEl = document.getElementById("chatLog");
const chatInputEl = document.getElementById("chatInput");
const readyBtn = document.getElementById("readyBtn");
const startBtn = document.getElementById("startBtn");
const gameEl = document.getElementById("game");

const groundY = 520;
const gravity = 0.6;
const baseMoveSpeed = 3.5;
const baseJumpSpeed = -11;

const textures = [
  "linear-gradient(135deg,#ff8a80,#ff5252)",
  "linear-gradient(135deg,#82b1ff,#2962ff)",
  "linear-gradient(135deg,#b9f6ca,#00c853)",
  "linear-gradient(135deg,#ffd180,#ff6d00)",
  "linear-gradient(135deg,#ea80fc,#d500f9)",
  "linear-gradient(135deg,#b0bec5,#455a64)"
];

let keys = {};

function updateGameState(state) {
  gameState = state;
  gameStateEl.textContent = state;
}

function updatePlayersList() {
  playersListEl.innerHTML = "";
  for (let id in players) {
    const p = players[id];
    const div = document.createElement("div");
    const itMark = p.isIt ? " (IT)" : "";
    div.textContent = (id === myId ? "(You) " : "") + p.name + itMark + (p.ready ? " ✔️" : "");
    playersListEl.appendChild(div);
  }
}

function logChat(msg, cls = "sysMsg") {
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = msg;
  chatLogEl.appendChild(div);
  chatLogEl.scrollTop = chatLogEl.scrollHeight;
}

function broadcast(msg) {
  if (!isHost) return;
  for (let id in connections) {
    if (connections[id].open) connections[id].send(msg);
  }
}

function sendToHost(msg) {
  if (myConn && myConn.open) myConn.send(msg);
}

function createPlayerElement(id) {
  let el = document.createElement("div");
  el.className = "player";
  el.id = "p_" + id;
  gameEl.appendChild(el);
}

function createPowerupElement(id) {
  let el = document.createElement("div");
  el.className = "powerup";
  el.id = "pu_" + id;
  gameEl.appendChild(el);
}

function renderPlayers() {
  const ids = Object.keys(players);
  ids.forEach((id, idx) => {
    const p = players[id];
    let el = document.getElementById("p_" + id);
    if (!el) createPlayerElement(id);
    el = document.getElementById("p_" + id);
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";
    el.style.backgroundImage = textures[idx % textures.length];
    if (p.isIt) el.classList.add("it"); else el.classList.remove("it");
    const boosted = (p.speedBoostUntil && Date.now() < p.speedBoostUntil) ||
                    (p.jumpBoostUntil && Date.now() < p.jumpBoostUntil);
    if (boosted) el.classList.add("boosted"); else el.classList.remove("boosted");
  });
}

function renderPowerups() {
  // remove old
  Array.from(document.querySelectorAll(".powerup")).forEach(el => {
    const id = el.id.replace("pu_", "");
    if (!powerups[id]) el.remove();
  });

  for (let id in powerups) {
    const pu = powerups[id];
    let el = document.getElementById("pu_" + id);
    if (!el) createPowerupElement(id);
    el = document.getElementById("pu_" + id);
    el.style.left = pu.x + "px";
    el.style.top = pu.y + "px";
    el.classList.toggle("speed", pu.type === "speed");
    el.classList.toggle("jump", pu.type === "jump");
  }
}

function spawnPowerup() {
  if (!isHost || gameState !== "PLAYING") return;
  if (Object.keys(powerups).length >= 6) return;

  const id = Math.random().toString(36).slice(2, 8);
  const type = Math.random() < 0.5 ? "speed" : "jump";
  const x = Math.random() * (1200 - 26);
  const y = groundY - 40 - Math.random() * 200;

  powerups[id] = { x, y, type };
  broadcast({ type: "powerupSpawn", id, x, y, powerupType: type });
  renderPowerups();
}

setInterval(() => {
  if (isHost && gameState === "PLAYING") spawnPowerup();
}, 3500);

function checkCollision(a, b) {
  const ax1 = a.x, ay1 = a.y, ax2 = a.x + 40, ay2 = a.y + 60;
  const bx1 = b.x, by1 = b.y, bx2 = b.x + 40, by2 = b.y + 60;
  return ax1 < bx2 && ax2 > bx1 && ay1 < by2 && ay2 > by1;
}

function checkPowerupCollision(p) {
  for (let id in powerups) {
    const pu = powerups[id];
    const ax1 = p.x, ay1 = p.y, ax2 = p.x + 40, ay2 = p.y + 60;
    const bx1 = pu.x, by1 = pu.y, bx2 = pu.x + 26, by2 = pu.y + 26;
    const hit = ax1 < bx2 && ax2 > bx1 && ay1 < by2 && ay2 > by1;
    if (hit) return id;
  }
  return null;
}

function applyTag(fromId, toId) {
  if (!players[fromId] || !players[toId]) return;
  for (let id in players) players[id].isIt = false;
  players[toId].isIt = true;
  updatePlayersList();
  renderPlayers();
  broadcast({ type: "tagUpdate", itId: toId });
  logChat(`${players[fromId].name} tagged ${players[toId].name}. ${players[toId].name} is IT now!`, "sysMsg");
}

function physicsStep() {
  if (gameState !== "PLAYING" || !myId || !players[myId]) return;

  const p = players[myId];

  const speedBoost = p.speedBoostUntil && Date.now() < p.speedBoostUntil;
  const jumpBoost = p.jumpBoostUntil && Date.now() < p.jumpBoostUntil;

  const moveSpeed = speedBoost ? baseMoveSpeed * 1.8 : baseMoveSpeed;
  const jumpSpeed = jumpBoost ? baseJumpSpeed * 1.6 : baseJumpSpeed;

  if (keys["ArrowLeft"] || keys["a"]) p.x -= moveSpeed;
  if (keys["ArrowRight"] || keys["d"]) p.x += moveSpeed;

  if ((keys["ArrowUp"] || keys["w"] || keys[" "]) && p.y >= groundY - 0.1) {
    p.vy = jumpSpeed;
  }

  p.vy += gravity;
  p.y += p.vy;

  if (p.y > groundY) {
    p.y = groundY;
    p.vy = 0;
  }

  p.x = Math.max(0, Math.min(1200 - 40, p.x));

  if (isHost) {
    broadcast({ type: "update", id: myId, x: p.x, y: p.y, vy: p.vy });
  } else {
    sendToHost({ type: "move", id: myId, x: p.x, y: p.y, vy: p.vy });
  }

  const puId = checkPowerupCollision(p);
  if (puId) {
    if (isHost) {
      const pu = powerups[puId];
      delete powerups[puId];
      if (pu.type === "speed") {
        p.speedBoostUntil = Date.now() + 6000;
      } else {
        p.jumpBoostUntil = Date.now() + 6000;
      }
      broadcast({ type: "powerupRemove", id: puId });
      broadcast({
        type: "boost",
        id: myId,
        speedUntil: p.speedBoostUntil || 0,
        jumpUntil: p.jumpBoostUntil || 0
      });
      renderPowerups();
    } else {
      sendToHost({ type: "pickup", id: myId, powerupId: puId });
    }
  }

  if (p.isIt) {
    for (let id in players) {
      if (id === myId) continue;
      const o = players[id];
      if (checkCollision(p, o)) {
        if (isHost) {
          applyTag(myId, id);
        } else {
          sendToHost({ type: "tag", from: myId, to: id });
        }
        break;
      }
    }
  }

  renderPlayers();
}

function gameLoop() {
  physicsStep();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// HOST
function setupHost() {
  peer = new Peer();
  isHost = true;

  peer.on("open", id => {
    myId = id;
    myIdEl.textContent = "Host ID: " + id;
    statusEl.textContent = "Waiting for players...";
    readyBtn.disabled = false;
    chatInputEl.disabled = false;

    players[id] = {
      name: document.getElementById("nameInput").value || "Host",
      ready: false,
      x: 100,
      y: groundY,
      vy: 0,
      isIt: true,
      speedBoostUntil: 0,
      jumpBoostUntil: 0
    };
    updatePlayersList();
    renderPlayers();
  });

  peer.on("connection", conn => {
    if (Object.keys(players).length >= 6) {
      conn.close();
      return;
    }

    connections[conn.peer] = conn;

    conn.on("data", data => {
      if (data.type === "join") {
        const idx = Object.keys(players).length;
        players[data.id] = {
          name: data.name,
          ready: false,
          x: 200 + (idx * 80),
          y: groundY,
          vy: 0,
          isIt: false,
          speedBoostUntil: 0,
          jumpBoostUntil: 0
        };

        conn.send({ type: "fullState", players, powerups, gameState });
        broadcast({ type: "playerJoined", id: data.id, player: players[data.id] });

        updatePlayersList();
        renderPlayers();
        logChat(`${data.name} joined`, "sysMsg");
      }

      if (data.type === "move" && gameState === "PLAYING") {
        const p = players[data.id];
        if (!p) return;
        p.x = data.x;
        p.y = data.y;
        p.vy = data.vy;
        broadcast({ type: "update", id: data.id, x: p.x, y: p.y, vy: p.vy });
        renderPlayers();
      }

      if (data.type === "ready") {
        players[data.id].ready = data.ready;
        broadcast({ type: "readyUpdate", id: data.id, ready: data.ready });
        updatePlayersList();

        const allReady = Object.values(players).length > 1 &&
          Object.values(players).every(p => p.ready);
        startBtn.disabled = !allReady;
      }

      if (data.type === "chat") {
        const sender = players[data.id].name;
        broadcast({ type: "chat", id: data.id, name: sender, text: data.text });
        logChat(sender + ": " + data.text, "otherMsg");
      }

      if (data.type === "tag") {
        applyTag(data.from, data.to);
      }

      if (data.type === "pickup") {
        const pu = powerups[data.powerupId];
        if (!pu) return;
        delete powerups[data.powerupId];

        const p = players[data.id];
        if (!p) return;

        if (pu.type === "speed") {
          p.speedBoostUntil = Date.now() + 6000;
        } else {
          p.jumpBoostUntil = Date.now() + 6000;
        }

        broadcast({ type: "powerupRemove", id: data.powerupId });
        broadcast({
          type: "boost",
          id: data.id,
          speedUntil: p.speedBoostUntil || 0,
          jumpUntil: p.jumpBoostUntil || 0
        });
        renderPowerups();
        renderPlayers();
      }
    });

    conn.on("close", () => {
      const pid = conn.peer;
      if (players[pid]) {
        logChat(`${players[pid].name} left`, "sysMsg");
        delete players[pid];
        broadcast({ type: "playerLeft", id: pid });
        const el = document.getElementById("p_" + pid);
        if (el) el.remove();
        updatePlayersList();
      }
      delete connections[pid];
    });
  });
}

// GUEST
function setupGuest(hostId) {
  peer = new Peer();

  peer.on("open", id => {
    myId = id;
    myIdEl.textContent = "Your ID: " + id;
    statusEl.textContent = "Connecting...";
    readyBtn.disabled = false;
    chatInputEl.disabled = false;

    myConn = peer.connect(hostId);

    myConn.on("open", () => {
      statusEl.textContent = "Connected";
      myConn.send({
        type: "join",
        id,
        name: document.getElementById("nameInput").value || "Player"
      });
    });

    myConn.on("data", data => {
      if (data.type === "fullState") {
        players = data.players;
        powerups = data.powerups || {};
        updateGameState(data.gameState || "LOBBY");
        updatePlayersList();
        renderPlayers();
        renderPowerups();
      }

      if (data.type === "playerJoined") {
        players[data.id] = data.player;
        updatePlayersList();
        renderPlayers();
        logChat(`${data.player.name} joined`, "sysMsg");
      }

      if (data.type === "playerLeft") {
        delete players[data.id];
        const el = document.getElementById("p_" + data.id);
        if (el) el.remove();
        updatePlayersList();
      }

      if (data.type === "readyUpdate") {
        players[data.id].ready = data.ready;
        updatePlayersList();
      }

      if (data.type === "chat") {
        const cls = data.id === myId ? "meMsg" : "otherMsg";
        logChat(data.name + ": " + data.text, cls);
      }

      if (data.type === "update") {
        if (!players[data.id]) return;
        players[data.id].x = data.x;
        players[data.id].y = data.y;
        players[data.id].vy = data.vy;
        renderPlayers();
      }

      if (data.type === "stateChange") {
        updateGameState(data.state);
      }

      if (data.type === "tagUpdate") {
        for (let id in players) players[id].isIt = false;
        if (players[data.itId]) players[data.itId].isIt = true;
        updatePlayersList();
        renderPlayers();
      }

      if (data.type === "powerupSpawn") {
        powerups[data.id] = { x: data.x, y: data.y, type: data.powerupType };
        renderPowerups();
      }

      if (data.type === "powerupRemove") {
        delete powerups[data.id];
        renderPowerups();
      }

      if (data.type === "boost") {
        const p = players[data.id];
        if (!p) return;
        p.speedBoostUntil = data.speedUntil || 0;
        p.jumpBoostUntil = data.jumpUntil || 0;
        renderPlayers();
      }
    });
  });
}

// UI handlers
document.getElementById("hostBtn").onclick = () => {
  if (!peer) setupHost();
};

document.getElementById("joinBtn").onclick = () => {
  if (!peer) {
    const hostId = document.getElementById("joinId").value.trim();
    if (hostId) setupGuest(hostId);
  }
};

readyBtn.onclick = () => {
  if (!myId || !players[myId]) return;
  const newReady = !players[myId].ready;
  players[myId].ready = newReady;
  updatePlayersList();

  if (isHost) {
    broadcast({ type: "readyUpdate", id: myId, ready: newReady });
    const allReady = Object.values(players).length > 1 &&
      Object.values(players).every(p => p.ready);
    startBtn.disabled = !allReady;
  } else {
    sendToHost({ type: "ready", id: myId, ready: newReady });
  }
};

startBtn.onclick = () => {
  if (!isHost) return;
  updateGameState("PLAYING");
  broadcast({ type: "stateChange", state: "PLAYING" });
  statusEl.textContent = "Game started – run, jump, tag!";
};

chatInputEl.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const text = chatInputEl.value.trim();
  if (!text || !myId) return;
  chatInputEl.value = "";

  const name = players[myId].name;

  if (isHost) {
    broadcast({ type: "chat", id: myId, name, text });
    logChat(name + ": " + text, "meMsg");
  } else {
    sendToHost({ type: "chat", id: myId, text });
    logChat(name + ": " + text, "meMsg");
  }
});

// input
window.addEventListener("keydown", e => {
  keys[e.key] = true;
});

window.addEventListener("keyup", e => {
  keys[e.key] = false;
});
</script>
</body>
</html>
